<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Asistencia</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="contenedor">

    <div class="titulo">
        <h2>Pantalla de asistencia</h2>
    </div>

    <div class="fecha">
        <label>Fecha:</label>
        <input type="date" value="2025-05-10">
    </div>

    <div class="boton-centro">
        <button>Tomar asistencia</button>
    </div>

    <hr>

    <h3>Tabla de alumnos</h3>

    <table>
        <thead>
            <tr>
                <th>Alumno</th>
                <th>Asistencia</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Juan Pérez</td>
                <td>
                    <label>
                        <input type="radio" name="juan" checked>
                        Presente
                    </label><br>

                    <label>
                        <input type="radio" name="juan">
                        Falta
                    </label>
                </td>
            </tr>

            <tr>
                <td>María López</td>
                <td>
                    <label>
                        <input type="radio" name="maria">
                        Presente
                    </label><br>

                    <label>
                        <input type="radio" name="maria" checked>
                        Falta
                    </label>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="guardar">
        <button>Guardar asistencia</button>
    </div>

</div>

</body>
