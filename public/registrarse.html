<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema - Crear Cuenta</title>
    <link rel="stylesheet" href="css/w3.css">
    <style>
        body { 
            background: #f5f5f5; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card-registro { 
            width: 100%; 
            max-width: 450px; 
            border-radius: 12px; 
        }
        .btn-azul { 
            background: #0D47A1; 
            color: white; 
            font-weight: bold; 
            border-radius: 8px; 
        }
        .btn-azul:hover { 
            background: #0b3c8f !important; 
        }
    </style>
</head>
<body>

<div class="w3-card-4 w3-white w3-padding-32 card-registro">
    <div class="w3-container w3-center">
        <h3 class="w3-text-blue-grey" style="font-weight: bold;">CREAR CUENTA</h3>
        <p class="w3-text-grey">Registra un nuevo usuario en la plataforma</p>
    </div>

    <form class="w3-container w3-margin-top" id="formRegistro" onsubmit="ejecutarRegistro(event)">
        <p>
            <label class="w3-text-grey"><b>Nombre Completo</b></label>
            <input class="w3-input w3-border w3-round" type="text" id="nombre" required style="padding: 10px;">
        </p>
        <p>
            <label class="w3-text-grey"><b>Correo Electrónico</b></label>
            <input class="w3-input w3-border w3-round" type="email" id="correo" required style="padding: 10px;">
        </p>
        <p>
            <label class="w3-text-grey"><b>Contraseña</b></label>
            <input class="w3-input w3-border w3-round" type="password" id="password" required style="padding: 10px;">
        </p>
        <p class="w3-margin-top">
            <button type="submit" class="w3-button w3-block btn-azul w3-padding-large">Registrar Usuario</button>
        </p>
    </form>

    <div class="w3-container w3-center w3-margin-top">
        <p class="w3-small w3-text-grey">
            ¿Ya tienes cuenta? <a href="/iniciar" class="w3-text-blue" style="font-weight: bold; text-decoration: none;">Inicia sesión aquí</a>
        </p>
        <p class="w3-small">
            <a href="/" class="w3-text-grey" style="text-decoration: none;">← Volver al Inicio</a>
        </p>
    </div>
</div>

<script>
async function ejecutarRegistro(e) {
    e.preventDefault();

    const nombre = document.getElementById('nombre').value;
    const correo = document.getElementById('correo').value;
    const password = document.getElementById('password').value;
    
    // Asignamos el rol fijo por defecto
    const rol = 'profesor'; 

    try {
        const respuesta = await fetch('/api/usuarios/registrar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nombre, correo, password, rol })
        });

        const datos = await respuesta.json();

        if (respuesta.ok && datos.success) {
            alert("¡Usuario registrado con éxito en la base de datos!");
            document.getElementById('formRegistro').reset();
            window.location.href = '/iniciar';
        } else {
            alert("Error al registrar: " + datos.mensaje);
        }
    } catch (error) {
        alert("Ocurrió un problema al conectar con el servidor.");
    }
}
</script>

</body>
</html>
